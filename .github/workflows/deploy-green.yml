name: Deploy Green

on:
  workflow_dispatch:

jobs:
  deploy-green:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create deployment package
        run: |
          cd app
          zip -r ../app.zip .

      - name: Upload package to S3
        run: |
          aws s3 cp app.zip \
            s3://${{ secrets.EB_ARTIFACT_BUCKET }}/green-${{ github.sha }}.zip

      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ secrets.EB_APP_NAME }}" \
            --version-label "green-${{ github.sha }}" \
            --source-bundle S3Bucket=${{ secrets.EB_ARTIFACT_BUCKET }},S3Key=green-${{ github.sha }}.zip

      - name: Deploy to Green
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name "3tier-beanstalk-green" \
            --version-label "green-${{ github.sha }}"

      - name: Wait for Green to be ready
        run: |
          aws elasticbeanstalk wait environment-updated \
            --application-name "${{ secrets.EB_APP_NAME }}" \
            --environment-names "3tier-beanstalk-green"